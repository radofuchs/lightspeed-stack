# .github/workflows/e2e_test.yml
name: E2E Tests

on: [push, pull_request_target]

jobs:
  e2e_tests:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          # On PR_TARGET → the fork (or same repo) that opened the PR.
          # On push      → falls back to the current repository.
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

          # On PR_TARGET → the PR head *commit* (reproducible).
          # On push      → the pushed commit that triggered the workflow.
          ref: ${{ github.event.pull_request.head.ref || github.sha }}

          # Don’t keep credentials when running untrusted PR code under PR_TARGET.
          persist-credentials: ${{ github.event_name != 'pull_request_target' }}

      - name: Debug checkout for umago/lightspeed-stack setup-metrics branch
        run: |
          echo "=== GitHub Event Information ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Base repo: ${{ github.repository }}"
          echo "Base SHA: ${{ github.sha }}"
          echo ""
          echo "=== PR Information ==="
          echo "PR head repo: '${{ github.event.pull_request.head.repo.full_name }}'"
          echo "PR head ref: '${{ github.event.pull_request.head.ref }}'"
          echo "PR head SHA: '${{ github.event.pull_request.head.sha }}'"
          echo "PR number: ${{ github.event.pull_request.number }}"
          echo ""
          echo "=== Resolved Checkout Values ==="
          echo "Repository used: ${{ github.event.pull_request.head.repo.full_name || github.repository }}"
          echo "Ref used: ${{ github.event.pull_request.head.ref || github.sha }}"
          echo ""
          echo "=== Expected for umago/lightspeed-stack:setup-metrics ==="
          echo "Should be repo: umago/lightspeed-stack" 
          echo "Should be ref: setup-metrics"

      - name: Verify actual git checkout result
        run: |
          echo "=== Git Status After Checkout ==="
          echo "Remote URLs:"
          git remote -v
          echo ""
          echo "Current branch: $(git branch --show-current 2>/dev/null || echo 'detached HEAD')"
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Current commit message: $(git log -1 --oneline)"
          echo ""
          echo "=== Recent commits (should show setup-metrics commits) ==="
          git log --oneline -5

      - uses: 1arp/create-a-file-action@0.4.5
        env: 
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          path: '.'
          isAbsolutePath: false
          file: 'lightspeed-stack.yaml'
          content: |
            name: Lightspeed Core Service (LCS)
            service:
              host: 0.0.0.0
              port: 8080
              auth_enabled: false
              workers: 1
              color_log: true
              access_log: true
            llama_stack:
              # Uses a remote llama-stack service
              # The instance would have already been started with a llama-stack-run.yaml file
              use_as_library_client: false
              # Alternative for "as library use"
              # use_as_library_client: true
              # library_client_config_path: <path-to-llama-stack-run.yaml-file>
              url: http://llama-stack:8321
              api_key: xyzzy
            user_data_collection:
              feedback_enabled: true
              feedback_storage: "/tmp/data/feedback"
              transcripts_enabled: true
              transcripts_storage: "/tmp/data/transcripts"

            authentication:
              module: "noop"

      - name: Select and configure run.yaml
        run: |
          # Set configuration directory and environment
          CONFIG_DIR="config"
          ENVIRONMENT="${MATRIX_ENV:-ci}"  # Default to 'ci' if not specified
          
          echo "🔍 Looking for configuration files in $CONFIG_DIR/"
          
          # List available configurations
          if [ -d "$CONFIG_DIR" ]; then
            echo "Available configurations:"
            ls -la "$CONFIG_DIR"/*.yaml 2>/dev/null || echo "No YAML files found in $CONFIG_DIR/"
          fi
          
          # Determine which config file to use
          CONFIG_FILE="${CONFIG_DIR}/run-${ENVIRONMENT}.yaml"
          
          echo "🎯 Looking for: $CONFIG_FILE"
          
          if [ -f "$CONFIG_FILE" ]; then
            echo "✅ Found specific config: $CONFIG_FILE"
            cp "$CONFIG_FILE" run-ci.yaml
          elif [ -f "$CONFIG_DIR/run.yaml" ]; then
            echo "⚙️  Using default config: $CONFIG_DIR/run.yaml"
            cp "$CONFIG_DIR/run.yaml" run-ci.yaml
          elif [ -f "run.yaml" ]; then
            echo "🔄 Falling back to root run.yaml"
            cp run.yaml run-ci.yaml
          else
            echo "❌ No configuration file found!"
            exit 1
          fi
          
          # Update paths for container environment (relative -> absolute)
          sed -i 's|db_path: \.llama/distributions|db_path: /app-root/.llama/distributions|g' run-ci.yaml
          sed -i 's|db_path: tmp/|db_path: /app-root/.llama/distributions/|g' run-ci.yaml
          
          # Set OpenAI API key for container
          sed -i "s|api_key: \${env\.OPENAI_API_KEY}|api_key: $OPENAI_API_KEY|g" run-ci.yaml
          
          echo "✅ Created run-ci.yaml for $ENVIRONMENT environment"
          echo "📝 Configuration summary:"
          echo "   Source: $(basename "$CONFIG_FILE")"
          echo "   Key model count: $(grep -c "model_id:" run-ci.yaml)"
          echo "   Providers: $(grep -c "provider_id:" run-ci.yaml)"

      - name: list files
        run: |
          echo "=== Configuration Summary ==="
          echo "Source config: configs/run-$CONFIG_ENVIRONMENT.yaml"
          echo "Final file: run-ci.yaml"
          echo "Container mount: /app-root/run.yaml"
          echo ""
          echo "=== Final Configuration Preview ==="
          echo "Providers: $(grep -c "provider_id:" run-ci.yaml)"
          echo "Models: $(grep -c "model_id:" run-ci.yaml)"
          echo "Database paths (first 3):"
          grep "db_path:" run-ci.yaml | head -3
          echo ""
          echo "✅ Ready for container deployment"

      - name: Run service manually
        env: 
            OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Debug: Check if environment variable is available for docker-compose
          echo "OPENAI_API_KEY is set: $([ -n "$OPENAI_API_KEY" ] && echo 'YES' || echo 'NO')"
          echo "OPENAI_API_KEY length: ${#OPENAI_API_KEY}"
          
          docker compose version
          docker compose up -d
          
          # Check for errors and show logs if any services failed
          if docker compose ps | grep -E 'Exit|exited|stopped'; then
            echo "Some services failed to start - showing logs:"
            docker compose logs
            exit 1
          else
            echo "All services started successfully"
          fi

      - name: Wait for services
        run: |
          echo "Waiting for services to be healthy..."
          sleep 20  # adjust depending on boot time

      - name: Quick connectivity test
        run: |
          echo "Testing basic connectivity before full test suite..."
          curl -f http://localhost:8080/v1/models || {
            echo "❌ Basic connectivity failed - showing logs before running full tests"
            docker compose logs --tail=30
            exit 1
          }

      - name: Run e2e tests
        run: |
          echo "Installing test dependencies..."
          pip install uv
          uv sync

          echo "Running comprehensive e2e test suite..."
          make test-e2e

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Test failure logs ==="
          echo "=== llama-stack logs ==="
          docker compose logs llama-stack
          
          echo ""
          echo "=== lightspeed-stack logs ==="
          docker compose logs lightspeed-stack

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== Test failure logs ==="
          echo "=== llama-stack logs ==="
          docker compose logs llama-stack
          
          echo ""
          echo "=== lightspeed-stack logs ==="
          docker compose logs lightspeed-stack
