# Llama Stack pod: uses pre-built image from in-cluster build.
#
# The image is built by pipeline.sh using oc new-build + test.containerfile.
# Only a small init container extracts the RAG DB into the shared volume.
#
# Requires: ConfigMap llama-stack-config (run.yaml), ConfigMap rag-data (kv_store.db.gz).
# Requires: Image built as ${LLAMA_STACK_IMAGE} (set by pipeline.sh).
#
apiVersion: v1
kind: Pod
metadata:
  name: llama-stack-service
  labels:
    pod: llama-stack-service
spec:
  securityContext:
    seccompProfile:
      type: RuntimeDefault
  initContainers:
    - name: setup-rag-data
      image: busybox:latest
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      command:
        - /bin/sh
        - -c
        - |
          mkdir -p /data/src/.llama/storage/rag /data/src/.llama/storage/files
          chmod -R 777 /data
          gunzip -c /rag-data/kv_store.db.gz > /data/src/.llama/storage/rag/kv_store.db
          chmod -R 777 /data
          echo "RAG data extracted successfully"
      volumeMounts:
        - name: rag-storage
          mountPath: /data
        - name: rag-data
          mountPath: /rag-data
  containers:
    - name: llama-stack-container
      image: ${LLAMA_STACK_IMAGE}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      workingDir: /opt/app-root
      env:
        - name: KV_STORE_PATH
          value: "/opt/app-root/src/.llama/storage/kv_store.db"
        - name: KV_RAG_PATH
          value: "/opt/app-root/src/.llama/storage/rag/kv_store.db"
        - name: SQL_STORE_PATH
          value: "/opt/app-root/src/.llama/storage/sql_store.db"
        - name: KSVC_URL
          valueFrom:
            secretKeyRef:
              name: api-url-secret
              key: key
        - name: VLLM_API_KEY
          valueFrom:
            secretKeyRef:
              name: vllm-api-key-secret
              key: key
        - name: INFERENCE_MODEL
          value: "meta-llama/Llama-3.1-8B-Instruct"
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key-secret
              key: key
              optional: true
        - name: E2E_OPENAI_MODEL
          value: "gpt-4o-mini"
        - name: FAISS_VECTOR_STORE_ID
          valueFrom:
            secretKeyRef:
              name: faiss-vector-store-secret
              key: id
      ports:
        - containerPort: 8321
      readinessProbe:
        httpGet:
          path: /v1/health
          port: 8321
        initialDelaySeconds: 20
        periodSeconds: 5
        failureThreshold: 36
      livenessProbe:
        httpGet:
          path: /v1/health
          port: 8321
        initialDelaySeconds: 120
        periodSeconds: 20
        failureThreshold: 3
      volumeMounts:
        - name: rag-storage
          mountPath: /opt/app-root/src/.llama/storage/rag
        - name: config
          mountPath: /opt/app-root/run.yaml
          subPath: run.yaml
  volumes:
    - name: rag-storage
      emptyDir: {}
    - name: config
      configMap:
        name: llama-stack-config
    - name: rag-data
      configMap:
        name: rag-data
