# In-cluster TLS-intercepting proxy for proxy.feature (Konflux / Prow).
# Llama Stack run.yaml points at http://e2e-interception-proxy.<ns>.svc.cluster.local:8889
apiVersion: v1
kind: Pod
metadata:
  name: e2e-interception-proxy
  labels:
    app: e2e-interception-proxy
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: e2e-interception-proxy
      image: python:3.12-slim
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      workingDir: /app
      env:
        - name: HOME
          value: /tmp
        - name: PYTHONPATH
          value: /app:/tmp/pydeps
      command:
        - /bin/sh
        - -c
        - |
          set -e
          pip install --quiet --no-cache-dir --target /tmp/pydeps 'trustme>=1.2.1'
          exec python /app/interception_proxy.py
      ports:
        - containerPort: 8889
          name: proxy
        - containerPort: 8886
          name: stats
      volumeMounts:
        - name: proxy-scripts
          mountPath: /app
          readOnly: true
      readinessProbe:
        httpGet:
          path: /stats
          port: stats
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /stats
          port: stats
        initialDelaySeconds: 10
        periodSeconds: 15
  volumes:
    - name: proxy-scripts
      configMap:
        name: e2e-interception-proxy-script
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-interception-proxy
spec:
  selector:
    app: e2e-interception-proxy
  ports:
    - name: proxy
      port: 8889
      targetPort: proxy
    - name: stats
      port: 8886
      targetPort: stats
