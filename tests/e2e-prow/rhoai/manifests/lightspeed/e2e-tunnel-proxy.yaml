# In-cluster HTTP CONNECT tunnel proxy for proxy.feature (Konflux / Prow).
# Llama Stack run.yaml points at http://e2e-tunnel-proxy.<ns>.svc.cluster.local:8888
apiVersion: v1
kind: Pod
metadata:
  name: e2e-tunnel-proxy
  labels:
    app: e2e-tunnel-proxy
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: e2e-tunnel-proxy
      image: python:3.12-slim
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      workingDir: /app
      env:
        - name: PYTHONPATH
          value: /app
      command: ["python", "/app/tunnel_proxy.py"]
      ports:
        - containerPort: 8888
          name: proxy
        - containerPort: 8887
          name: stats
      volumeMounts:
        - name: proxy-scripts
          mountPath: /app
          readOnly: true
      readinessProbe:
        httpGet:
          path: /stats
          port: stats
        initialDelaySeconds: 2
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /stats
          port: stats
        initialDelaySeconds: 5
        periodSeconds: 15
  volumes:
    - name: proxy-scripts
      configMap:
        name: e2e-tunnel-proxy-script
---
apiVersion: v1
kind: Service
metadata:
  name: e2e-tunnel-proxy
spec:
  selector:
    app: e2e-tunnel-proxy
  ports:
    - name: proxy
      port: 8888
      targetPort: proxy
    - name: stats
      port: 8887
      targetPort: stats
