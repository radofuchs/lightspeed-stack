apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: e2e-rhoai-dsc
spec:
  serviceAccountName: test-pod-sa
  containers:
  - name: test-container
    env:
      - name: E2E_LSC_HOSTNAME
        valueFrom:
          secretKeyRef:
            name: lcs-ip-secret
            key: key
      - name: E2E_LLAMA_HOSTNAME
        valueFrom:
          secretKeyRef:
            name: llama-stack-ip-secret
            key: key
      - name: NAMESPACE
        value: "e2e-rhoai-dsc"
    image: registry.access.redhat.com/ubi9/python-312
    command: ["/bin/bash", "-c"]
    args:
      - |
        # Install oc CLI
        echo "Installing oc CLI..."
        curl -sL "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/stable/openshift-client-linux.tar.gz" | tar -xz -C /usr/local/bin oc
        
        # Make restart script available
        cp /restart-scripts/restart-lightspeed.sh /usr/local/bin/restart-lightspeed
        chmod +x /usr/local/bin/restart-lightspeed
        
        # Run the test script
        /scripts/run-tests.sh
    volumeMounts:
    - name: script-volume
      mountPath: /scripts
    - name: restart-scripts
      mountPath: /restart-scripts
    - name: lightspeed-manifests
      mountPath: /manifests
  volumes:
  - name: script-volume
    configMap:
      name: test-script-cm
      defaultMode: 0755
  - name: restart-scripts
    configMap:
      name: restart-scripts-cm
      defaultMode: 0755
  - name: lightspeed-manifests
    configMap:
      name: lightspeed-manifests-cm
  restartPolicy: Never